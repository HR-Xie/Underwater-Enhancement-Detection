VERBOSE: True

MODEL:
  SESSION: 'UW'

# Optimization arguments.
OPTIM:
  BATCH_SIZE: 1
  NUM_EPOCHS: 200
  LR_INITIAL: 2e-4
  LR_MIN: 1e-6
  SEED: 3407
  WANDB: False

TRAINING:
  VAL_AFTER_EVERY: 1
  RESUME: False
  PS_W: 256
  PS_H: 256
  TRAIN_DIR: '../Unet/datas/UIEB/train/' # path to training data
  VAL_DIR: '../Unet/datas/UIEB/test/'     # path to validation data
  SAVE_DIR: './checkpoints/'          # path to save models and images
  ORI: True

TESTING:
  WEIGHT: './UIEB_weight/UW_epoch_166.pth'
  SAVE_IMAGES: True